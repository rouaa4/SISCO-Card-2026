<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SISCO Eid Mubarak 2026</title>

  <!-- Load Noto Kufi Arabic correctly -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Load html2canvas correctly -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --name-color:#6A5843;
      --shadow:0 1px 3px rgba(0,0,0,.45);
      --preview-bottom:14px;   /* مكان الاسم على الموقع */
      --export-bottom:17px;    /* مكان الاسم في الصورة المصدّرة */
    }

    body{
      margin:0;
      padding:20px;
      background:#f8f3e9;
      font-family:"Noto Kufi Arabic", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      color:#222;
    }

    .app{max-width:780px; margin:0 auto; display:grid; gap:16px}

    h2{
      text-align:center;
      font-size:22px;
      font-weight:600;
      color:#0f172a;
      margin:0;
    }

    .panel{
      background:#fff;
      border-radius:12px;
      padding:16px;
      box-shadow:0 4px 10px rgba(0,0,0,.1);
    }

    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}

    input{
      flex:1; min-width:260px;
      padding:12px 14px;
      border-radius:10px;
      border:2px solid #0c4a6e55;
      font-size:18px;
      font-family:"Noto Kufi Arabic", sans-serif;
    }
    input:focus{outline:none; border-color:#0c4a6e; box-shadow:0 0 0 3px #0c4a6e33}

    .btn{
      background:#0c4a6e; color:#fff; border:0;
      padding:12px 16px; border-radius:10px;
      font-weight:700; cursor:pointer;
    }

    .preview-area{display:flex; justify-content:center}

    .card{
      width:500px; aspect-ratio:1/1;
      position:relative; border-radius:14px; overflow:hidden;
      background:url('./assets/eid-card-base.png') center/cover no-repeat;
      border:1px solid #e6e0d6;
    }

    /* الاسم في المعاينة (الموقع) */
    .name-place{
      position:absolute; left:0; right:0;
      bottom:var(--preview-bottom);
      text-align:center;
      color:var(--name-color);
      font-family:"Noto Kufi Arabic", sans-serif;
      font-size:16px;
      font-weight:600;
      text-shadow:var(--shadow);
      display:none; z-index:10;
    }

    /* منطقة التصدير 600×600 */
    .export-stage{position:fixed; left:-99999px; top:-99999px; width:600px; height:600px}
    .export-card{
      position:relative; width:600px; height:600px;
      background:url('./assets/eid-card-base.png') center/cover no-repeat;
    }

    /* الاسم داخل الصورة عند التحميل */
    .export-name{
      position:absolute; left:0; right:0;
      bottom:var(--export-bottom);
      text-align:center;
      color:var(--name-color);
      font-family:"Noto Kufi Arabic", sans-serif;
      font-size:20px;    /* ≈ 16px في المعاينة */
      font-weight:600;
      text-shadow:var(--shadow);
      display:none; z-index:10;
    }
  </style>
</head>

<body>
  <div class="app">
    <h2>👇 Type your name below / 👇 اكتب اسمك هنا — SISCO Eid Mubarak 2026</h2>

    <div class="panel">
      <div class="row">
        <input id="fullName" placeholder="Type your name here | اكتب الاسم هنا" />
        <button class="btn" id="downloadBtn">Download Card</button>
      </div>
    </div>

    <div class="panel preview-area">
      <div class="card">
        <div id="namePreview" class="name-place"></div>
      </div>
    </div>
