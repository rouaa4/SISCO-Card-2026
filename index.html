<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SISCO Eid Mubarak 2026</title>

  <!-- Load Noto Kufi Arabic correctly -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Load html2canvas correctly -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --name-color:#6A5843;
      --shadow:0 1px 3px rgba(0,0,0,.45);
      --preview-bottom:14px;
      --export-bottom:17px;
    }

    body{
      margin:0;
      padding:20px;
      background:#f8f3e9;
      font-family:"Noto Kufi Arabic", sans-serif;
      color:#222;
    }

    .app{max-width:780px; margin:0 auto; display:grid; gap:16px;}

    h2{
      text-align:center;
      font-size:22px;
      font-weight:600;
      color:#0f172a;
    }

    .panel{
      background:#fff;
      border-radius:12px;
      padding:16px;
      box-shadow:0 4px 10px rgba(0,0,0,.1);
    }

    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:2px solid #0c4a6e55;
      font-size:18px;
      font-family:"Noto Kufi Arabic";
    }

    input:focus{
      outline:none;
      border-color:#0c4a6e;
      box-shadow:0 0 0 3px #0c4a6e33;
    }

    .btn{
      margin-top:10px;
      background:#0c4a6e;
      color:#fff;
      padding:12px 16px;
      border-radius:10px;
      border:none;
      font-weight:700;
      cursor:pointer;
    }

    .preview-area{display:flex; justify-content:center}

    .card{
      width:500px;
      aspect-ratio:1/1;
      background:url('./assets/eid-card-base.png') center/cover no-repeat;
      border-radius:14px;
      position:relative;
      overflow:hidden;
    }

    .name-place{
      position:absolute;
      bottom:var(--preview-bottom);
      width:100%;
      text-align:center;
      color:var(--name-color);
      font-size:16px;
      font-weight:600;
      text-shadow:var(--shadow);
      display:none;
    }

    .export-zone{
      position:fixed;
      left:-99999px;
      top:-99999px;
      width:600px;
      height:600px;
    }

    .export-card{
      width:600px;
      height:600px;
      background:url('./assets/eid-card-base.png') center/cover no-repeat;
      position:relative;
    }

    .export-name{
      position:absolute;
      bottom:var(--export-bottom);
      width:100%;
      text-align:center;
      color:var(--name-color);
      font-size:20px;
      font-weight:600;
      text-shadow:var(--shadow);
      display:none;
    }
  </style>
</head>

<body>

  <div class="app">
    <h2>👇 اكتب اسمك هنا — SISCO Eid Mubarak 2026 👇</h2>

    <div class="panel">
      <input id="fullName" placeholder="اكتب الاسم هنا | Type your name here">
      <button class="btn" id="downloadBtn">Download Card</button>
    </div>

    <div class="panel preview-area">
      <div class="card">
        <div id="namePreview" class="name-place"></div>
      </div>
    </div>

    <div class="export-zone">
      <div class="export-card">
        <div id="nameExport" class="export-name"></div>
      </div>
    </div>
  </div>

<script>
  const input    = document.getElementById("fullName");
  const prevName = document.getElementById("namePreview");
  const expName  = document.getElementById("nameExport");

  function update(){
    const v = input.value.trim();
    if(v){
      prevName.style.display="block";
      expName.style.display="block";
      prevName.textContent=v;
      expName.textContent=v;
    } else {
      prevName.style.display="none";
      expName.style.display="none";
    }
  }

  input.addEventListener("input", update);

  document.getElementById("downloadBtn").onclick = async ()=>{
    const v = input.value.trim();
    if(!v){ alert("اكتب الاسم أولاً"); return; }

    const node = document.querySelector(".export-card");
    const canvas = await html2canvas(node,{scale:2,useCORS:true});
    const a=document.createElement("a");
    a.download=v+".png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  };
</script>

</body>
</html>
