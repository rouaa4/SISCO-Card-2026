<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SISCO Eid Mubarak 2026</title>

  <!-- Noto Kufi Arabic -->
  https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600&display=swap

  <!-- html2canvas -->
  https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js

  <style>
    body{
      margin:0;
      padding:20px;
      background:#f8f3e9;
      font-family:"Noto Kufi Arabic", sans-serif;
      color:#222;
    }

    .app{
      max-width:780px;
      margin:0 auto;
    }

    h2{
      text-align:center;
      font-size:22px;
      margin-bottom:20px;
      font-weight:500;
      color:#0f172a;
    }

    .panel{
      background:#fff;
      border-radius:12px;
      padding:16px;
      box-shadow:0 4px 10px rgba(0,0,0,.1);
      margin-bottom:14px;
    }

    input{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:2px solid #0c4a6e55;
      font-size:18px;
      margin-bottom:10px;
      font-family:"Noto Kufi Arabic", sans-serif;
      font-weight:400;
    }

    input:focus{
      outline:none;
      border-color:#0c4a6e;
      box-shadow:0 0 0 3px #0c4a6e33;
    }

    .btn{
      background:#0c4a6e;
      color:#fff;
      padding:12px 16px;
      border-radius:10px;
      border:none;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      width:180px;
    }

    .card-area{
      display:flex;
      justify-content:center;
      margin-top:20px;
    }

    .card{
      width:500px;
      aspect-ratio:1/1;
      border-radius:12px;
      overflow:hidden;
      position:relative;
      background:url('./assets/eid-card-base.png') center/cover no-repeat;
    }

    /* =======================
       Preview Name (Website)
       ======================= */
    .name-place{
      position:absolute;
      bottom:17px;   /* كما طلبتي */
      width:100%;
      text-align:center;
      font-family:"Noto Kufi Arabic", sans-serif;
      font-size:16px;
      font-weight:600;
      color:#6A5843;
      display:none;
      z-index:5;
    }

    /* =======================
       Export Name (PNG file)
       ======================= */
    .export-zone{
      position:fixed;
      left:-9999px;
      top:-9999px;
      width:600px;
      height:600px;
    }

    .export-card{
      position:relative;
      width:600px;
      height:600px;
      background:url('./assets/eid-card-base.png') center/cover no-repeat;
    }

    .export-name{
      position:absolute;
      bottom:23px;   /* مكافئ ومضبوط للصورة بعد التحميل */
      width:100%;
      text-align:center;
      font-family:"Noto Kufi Arabic", sans-serif;
      font-size:20px;  /* يعادل 16px في التصدير */
      font-weight:600;
      color:#6A5843;
      display:none;
      z-index:5;
    }
  </style>
</head>

<body>

  <div class="app">

    <h2>SISCO Eid Mubarak 2026 — اكتب اسمك هنا 👇 / Type your name below 👇</h2>

    <div class="panel">
      <input id="fullName" placeholder="اكتب الاسم هنا | Type your name here">
      <button class="btn" id="downloadBtn">Download Card</button>
    </div>

    <div class="panel card-area">
      <div class="card">
        <div id="namePreview" class="name-place"></div>
      </div>
    </div>

    <div class="export-zone">
      <div class="export-card">
        <div id="nameExport" class="export-name"></div>
      </div>
    </div>

  </div>

<script>
  const input = document.getElementById("fullName");
  const namePrev = document.getElementById("namePreview");
  const nameExpo = document.getElementById("nameExport");

  function updateName(){
    const v = input.value.trim();
    if(v){
      namePrev.style.display = "block";
      namePrev.textContent = v;

      nameExpo.style.display = "block";
      nameExpo.textContent = v;
    } else {
      namePrev.style.display = "none";
      nameExpo.style.display = "none";
    }
  }

  input.addEventListener("input", updateName);

  document.getElementById("downloadBtn").onclick = async () => {
    const v = input.value.trim();
    if(!v){ alert("اكتب الاسم أولاً"); return; }

    const zone = document.querySelector(".export-card");
    const canvas = await html2canvas(zone, { scale:2, useCORS:true });

    const a = document.createElement("a");
    a.download = v + ".png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  };
</script>

</body>
</html>
